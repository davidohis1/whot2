name: arena_games
description: Multiplayer Chess, Whot & Ludo Game App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_database: ^11.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  auto_size_text: ^3.0.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0
  vibration: ^3.1.6
  connectivity_plus: ^6.0.3
  collection: ^1.18.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# PASTE THIS AT THE VERY BOTTOM (NO INDENTATION)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#081C3B" # Dark blue from your Arena Games logo
  adaptive_icon_foreground: "assets/images/icon.png"
  